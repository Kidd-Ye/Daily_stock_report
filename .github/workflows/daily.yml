name: 每日涨停复盘自动推送
on:
  schedule:
    - cron: "0 8 * * 1-5"   # 每个交易日北京时间 16:00 运行（收盘后）
  workflow_dispatch:          # 允许手动触发测试

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # 允许写入仓库（提交 pdf）

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 安装依赖
        run: |
          pip install requests
          npm install
          # 确保 Linux 环境有中文字体（Noto Sans CJK SC）
          sudo apt-get update -qq && sudo apt-get install -y -qq fonts-noto-cjk 2>/dev/null || true

      - name: 运行程序（抓取数据 + 生成 PDF + 推送）
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_RECEIVE_ID: ${{ secrets.FEISHU_RECEIVE_ID }}
          FEISHU_RECEIVE_ID_TYPE: ${{ secrets.FEISHU_RECEIVE_ID_TYPE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python main.py
